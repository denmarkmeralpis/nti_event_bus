name: Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]+.[0-9]+.[0-9]+'

jobs:
  release:
    name: Build and push gem to RubyGems
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required for trusted publishing (OIDC) to RubyGems.
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v5
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Build and publish gem
        uses: rubygems/release-gem@v1
